# config/workflows.yaml — Workflow registry
# Workflows define ordered agent pipelines.
# enabled: true|false controls availability via the Hermes Console.

workflows:
  # ── Core MVP workflows ────────────────────────────────────────────
  - id: simple_answer
    name: "Réponse simple"
    enabled: true
    description: "Fast single-agent answer for C1 queries (info only)"
    steps:
      - HECATE
      - ARES
      - IRIS
    fallback: null

  - id: research
    name: "Recherche documentaire"
    enabled: true
    description: "Full research pipeline: route → collect → extract → cross-check → synthesize"
    steps:
      - HECATE
      - HERMES
      - ARGOS
      - PROMETHEUS
      - KAIROS
      - IRIS
    on_hecate_block:
      - IRIS
    fallback: simple_answer

  - id: dossier_build
    name: "Construction de dossier"
    enabled: true
    description: "Full document build: plan → research → extract → synthesize → build → communicate"
    steps:
      - ATHENA
      - HERMES
      - ARGOS
      - PROMETHEUS
      - KAIROS
      - DAEDALUS
      - APOLLO
      - IRIS
    fallback: research

  - id: clarification
    name: "Demande de clarification"
    enabled: true
    description: "Request clarification from user when intent is unclear or info is missing"
    steps:
      - HECATE
      - IRIS
    fallback: null

  # ── Extended workflows (disabled for MVP) ─────────────────────────
  - id: deep_research
    name: "Recherche approfondie"
    enabled: false
    description: "Extended research with Zeus orchestration and Hera supervision"
    steps:
      - ZEUS
      - ATHENA
      - HERMES
      - DEMETER
      - ARGOS
      - PROMETHEUS
      - ARTEMIS
      - KAIROS
      - DAEDALUS
      - HERA
      - APOLLO
      - IRIS

  - id: legal_check
    name: "Vérification légale"
    enabled: false
    description: "Process integrity check with Themis veto"
    steps:
      - THEMIS
      - ARGOS
      - PROMETHEUS
      - APOLLO

  - id: diagram_report
    name: "Rapport avec diagrammes"
    enabled: false
    description: "Full report with visual diagrams"
    steps:
      - KAIROS
      - DAEDALUS
      - HEPHAESTUS
      - APHRODITE
      - IRIS
