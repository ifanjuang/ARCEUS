# config/skills.yaml — Skill registry
# Skills are reusable capabilities invoked by agents.
# enabled: true|false controls availability.

skills:
  # ── Research skills ───────────────────────────────────────────────
  - id: hybrid_research
    name: "Recherche hybride"
    category: research
    enabled: true
    description: "Combines semantic search (pgvector) and full-text search with RRF reranking"
    agents: [HERMES, HADES]

  - id: web_search
    name: "Recherche web"
    category: research
    enabled: true
    description: "DuckDuckGo web search without API key"
    agents: [HERMES, DEMETER]

  - id: document_fetch
    name: "Récupération de documents"
    category: research
    enabled: true
    description: "Fetches and extracts text from PDFs, DOCX, HTML pages"
    agents: [DEMETER]

  # ── Document skills ───────────────────────────────────────────────
  - id: extract_facts
    name: "Extraction de faits"
    category: document
    enabled: true
    description: "Structured extraction of facts, figures, citations from text"
    agents: [ARGOS]

  - id: ingest_document
    name: "Ingestion documentaire"
    category: document
    enabled: true
    description: "Chunks, embeds and stores a document in pgvector"
    agents: [DEMETER, HADES]

  - id: build_dossier
    name: "Construction de dossier"
    category: document
    enabled: true
    description: "Assembles structured dossier from research results"
    agents: [DAEDALUS]

  # ── Synthesis skills ──────────────────────────────────────────────
  - id: structured_summary
    name: "Résumé structuré"
    category: synthesis
    enabled: true
    description: "Produces a hierarchized, cited summary of a multi-source response"
    agents: [KAIROS]

  - id: cross_check
    name: "Vérification croisée"
    category: synthesis
    enabled: true
    description: "Compares multiple source responses and flags contradictions"
    agents: [PROMETHEUS]

  # ── Validation skills ─────────────────────────────────────────────
  - id: confidence_scoring
    name: "Score de confiance"
    category: validation
    enabled: true
    description: "Computes reliability score for a response before release"
    agents: [APOLLO]

  - id: uncertainty_check
    name: "Vérification d'incertitude"
    category: validation
    enabled: true
    description: "Detects ambiguities and missing information before pipeline execution"
    agents: [HECATE]

  # ── Communication skills ──────────────────────────────────────────
  - id: tone_adaptation
    name: "Adaptation de ton"
    category: communication
    enabled: true
    description: "Reformulates output for the target audience"
    agents: [IRIS]

  - id: diagram_generation
    name: "Génération de diagrammes"
    category: communication
    enabled: false
    description: "Produces Mermaid diagrams and visual representations"
    agents: [HEPHAESTUS]
